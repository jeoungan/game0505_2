<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Campus Survival</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #fff4d2;
      --muted: #b8c8bd;
      --panel: #161b1a;
      --panel-2: #222b24;
      --edge: #d6b760;
      --danger: #ff786b;
      --water: #79c9ff;
      --tuna: #61d2b6;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(83, 120, 75, 0.28), transparent 28%),
        linear-gradient(180deg, #263529 0%, #121716 62%, #080a09 100%);
      font-family: "Courier New", monospace;
    }

    .screen-panel {
      width: min(100%, 760px);
      padding: 14px;
      border: 4px solid #6f7b62;
      background: var(--panel);
      box-shadow: 0 18px 0 #050706;
    }

    .topbar,
    .status-row,
    .overlay {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .eyebrow {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    h1 {
      margin: 4px 0 0;
      font-size: clamp(22px, 5vw, 34px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    button {
      border: 2px solid var(--ink);
      background: #2f392d;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      padding: 8px 12px;
      box-shadow: 3px 3px 0 #000;
    }

    button:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #000;
    }

    .stage {
      position: relative;
      width: 100%;
      max-width: 640px;
      margin: 14px auto;
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      border: 4px solid var(--edge);
      background: #315534;
      image-rendering: pixelated;
    }

    .overlay {
      position: absolute;
      inset: 10px 10px auto 10px;
      pointer-events: none;
      align-items: flex-start;
    }

    .modal-overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(8, 12, 10, 0.74);
    }

    .modal-panel {
      width: min(92%, 500px);
      padding: 18px;
      border: 3px solid var(--ink);
      background: rgba(18, 24, 21, 0.95);
      box-shadow: 6px 6px 0 #000;
    }

    .modal-panel p {
      margin: 0 0 14px;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.55;
    }

    .modal-actions,
    .name-row,
    .record-reset-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .name-row,
    .record-reset-actions {
      margin-top: 12px;
    }

    input {
      min-width: 0;
      flex: 1 1 170px;
      border: 2px solid #6f7b62;
      background: #0d1210;
      color: var(--ink);
      font: inherit;
      padding: 8px 10px;
    }

    .hidden {
      display: none !important;
    }

    .mobile-controls {
      display: none;
    }

    .joystick-base {
      position: absolute;
      left: max(18px, env(safe-area-inset-left));
      bottom: max(18px, env(safe-area-inset-bottom));
      width: 112px;
      height: 112px;
      border: 2px solid rgba(255, 244, 210, 0.48);
      border-radius: 999px;
      background: rgba(9, 13, 11, 0.34);
      touch-action: none;
      pointer-events: auto;
    }

    .joystick-stick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 46px;
      height: 46px;
      border: 2px solid rgba(255, 244, 210, 0.68);
      border-radius: 999px;
      background: rgba(121, 201, 255, 0.42);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .mobile-reset {
      display: none;
      position: absolute;
      right: max(12px, env(safe-area-inset-right));
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 2;
      min-width: 92px;
      min-height: 44px;
      padding: 8px 12px;
      pointer-events: auto;
    }

    .orientation-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      place-items: center;
      padding: 24px;
      background: #101411;
      color: var(--ink);
      text-align: center;
      font-size: 18px;
      line-height: 1.5;
    }

    .inventory,
    .timer {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 2px solid rgba(255, 244, 210, 0.72);
      background: rgba(12, 16, 14, 0.82);
      text-shadow: 2px 2px 0 #000;
    }

    .inventory span,
    .timer {
      white-space: nowrap;
    }

    .water { color: var(--water); }
    .tuna { color: var(--tuna); }
    .timer { color: var(--edge); font-size: 20px; }

    .status-row {
      border: 2px solid #536555;
      padding: 10px;
      background: #101411;
    }

    .status-row p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    #message {
      color: var(--ink);
    }

    @media (max-width: 560px) {
      body { padding: 10px; }
      .topbar,
      .status-row {
        align-items: stretch;
        flex-direction: column;
      }
      button { width: 100%; }
      .overlay {
        inset: 8px 8px auto 8px;
      }
      .modal-overlay {
        padding: 14px;
      }
      .inventory,
      .timer {
        padding: 6px 7px;
        font-size: 13px;
      }
      .timer { font-size: 16px; }
    }

    html.touch-device,
    html.touch-device body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    html.touch-device body {
      display: block;
      min-height: 100dvh;
      padding: 0;
      background: #050706;
      touch-action: none;
    }

    html.touch-device .screen-panel {
      width: 100vw;
      height: 100dvh;
      padding: 0;
      border: 0;
      box-shadow: none;
      background: #050706;
    }

    html.touch-device .topbar,
    html.touch-device .status-row {
      display: none;
    }

    html.touch-device .stage {
      width: 100vw;
      height: 100dvh;
      max-width: none;
      margin: 0;
      overflow: hidden;
    }

    html.touch-device.landscape-runtime canvas,
    html.touch-device.portrait-runtime canvas {
      width: 100vw;
      height: 100dvh;
      border: 0;
      aspect-ratio: auto;
    }

    html.touch-device .overlay {
      inset: max(8px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right)) auto max(8px, env(safe-area-inset-left));
    }

    html.touch-device .inventory,
    html.touch-device .timer {
      min-height: 38px;
      padding: 6px 9px;
      font-size: 16px;
    }

    html.touch-device .timer {
      font-size: 18px;
    }

    html.touch-device .modal-overlay {
      position: fixed;
      padding: 16px max(16px, env(safe-area-inset-right)) 16px max(16px, env(safe-area-inset-left));
    }

    html.touch-device .modal-panel {
      width: min(620px, 86vw);
      padding: 14px;
    }

    html.touch-device .modal-panel p {
      font-size: 14px;
      line-height: 1.45;
    }

    html.touch-device .mobile-controls {
      display: block;
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    html.touch-device .mobile-reset {
      display: block;
    }

    @media (hover: none) and (pointer: coarse) and (orientation: landscape) {
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        display: block;
        min-height: 100dvh;
        padding: 0;
        background: #050706;
        touch-action: none;
      }

      .screen-panel {
        width: 100vw;
        height: 100dvh;
        padding: 0;
        border: 0;
        box-shadow: none;
        background: #050706;
      }

      .topbar,
      .status-row {
        display: none;
      }

      .stage {
        width: 100vw;
        height: 100dvh;
        max-width: none;
        margin: 0;
        overflow: hidden;
      }

      canvas {
        width: 100vw;
        height: 100dvh;
        border: 0;
        aspect-ratio: auto;
      }

      .overlay {
        inset: max(8px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right)) auto max(8px, env(safe-area-inset-left));
      }

      .inventory,
      .timer {
        min-height: 38px;
        padding: 6px 9px;
        font-size: 16px;
      }

      .timer {
        font-size: 18px;
      }

      .modal-overlay {
        position: fixed;
        padding: 16px max(16px, env(safe-area-inset-right)) 16px max(16px, env(safe-area-inset-left));
      }

      .modal-panel {
        width: min(620px, 86vw);
        padding: 14px;
      }

      .modal-panel p {
        font-size: 14px;
        line-height: 1.45;
      }

      .mobile-controls {
        display: block;
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
      }
    }

    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      body {
        overflow: hidden;
      }

      .screen-panel {
        width: 100vw;
        height: 100dvh;
        padding: 0;
        border: 0;
        box-shadow: none;
        background: #050706;
      }

      .topbar,
      .status-row {
        display: none;
      }

      .stage {
        width: 100vw;
        height: 100dvh;
        max-width: none;
        margin: 0;
        overflow: hidden;
      }

      canvas {
        width: 100vw;
        height: 100dvh;
        border: 0;
        aspect-ratio: auto;
      }

      .mobile-controls {
        display: block;
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
      }

      .mobile-reset {
        display: block;
      }

      .orientation-overlay {
        display: none;
      }
    }
  </style>
</head>
<body>
  <section class="screen-panel" aria-label="campus survival game">
    <div class="topbar">
      <div>
        <p class="eyebrow">Campus Survival</p>
        <h1>생존 캠퍼스</h1>
      </div>
      <button id="resetButton" type="button">&#45796;&#49884; &#49884;&#51089;</button>
    </div>

    <div class="stage">
      <canvas id="gameCanvas" width="640" height="480" aria-label="game screen"></canvas>
      <div class="overlay" aria-label="survival status">
        <div class="inventory">
          <span class="water">물 <strong id="waterCount">0</strong></span>
          <span class="tuna">식량 <strong id="tunaCount">0</strong></span>
        </div>
        <div class="timer" id="timer">1:00</div>
      </div>
      <div class="modal-overlay" id="startOverlay" aria-label="game start briefing">
        <div class="modal-panel">
          <p>당신은 몬스터가 나타나는 학교에 갇혔습니다. 하루치 물과 식량을 가지고 시작합니다. 당신은 하루에 물과 식량을 3개씩 소비하고, 소비하지 못하면 다음 날 죽습니다. 식량을 찾아서 최대한 오래 살아남으세요. 모바일에서는 가로 화면 플레이를 권장하지만, 세로 화면에서도 바로 플레이할 수 있습니다.</p>
          <button id="startButton" type="button">START</button>
        </div>
      </div>
      <div class="modal-overlay hidden" id="scoreOverlay" aria-label="save survival record">
        <div class="modal-panel">
          <p id="scorePrompt">기록을 저장하시겠습니까?</p>
          <p id="scoreSummary"></p>
          <div class="modal-actions" id="scoreActions">
            <button id="saveRecordButton" type="button">저장</button>
            <button id="skipRecordButton" type="button">넘기기</button>
          </div>
          <div class="name-row hidden" id="nameRow">
            <input id="playerNameInput" type="text" maxlength="16" autocomplete="off" placeholder="플레이어 네임">
            <button id="confirmRecordButton" type="button">확인</button>
          </div>
          <p id="recordMessage" class="hidden"></p>
          <div class="record-reset-actions">
            <button id="scoreResetButton" type="button">다시 시작</button>
          </div>
        </div>
      </div>
      <div class="mobile-controls">
        <div class="joystick-base" id="joystickBase">
          <div class="joystick-stick" id="joystickStick"></div>
        </div>
        <button class="mobile-reset" id="mobileResetButton" type="button">다시 시작</button>
      </div>
    </div>

    <div class="status-row">
      <p id="message"></p>
      <p>생존 <span id="survivalTime">0:00</span></p>
    </div>
  </section>

  <div class="orientation-overlay" id="orientationOverlay">가로 화면 플레이를 권장하지만 세로 화면에서도 바로 플레이할 수 있습니다.</div>

  <script src="./game-standalone.js"></script>
</body>
</html>
